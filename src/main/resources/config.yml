# ============================================================
#   EgoV1.0 Configuration
# ============================================================

# Maximum number of bots a single player can own
max-bots-per-player: 1

# Permission required to spawn a bot (set to "" to allow everyone)
spawn-permission: "ego.spawn"

# Bot display name (supports & color codes)
bot-name: "&bEgoBot"

# ============================================================
#   AI Tick Settings
# ============================================================
ai:
  # How often the AI brain ticks (20 ticks = 1 second)
  tick-interval: 40

  # How often the combat scanner runs (faster than main AI)
  combat-tick-interval: 10

  # Radius (blocks) to scan for hostile mobs
  combat-scan-radius: 6

  # Radius (blocks) to scan for ores (Mining Mode)
  mining-scan-radius: 5

  # Radius (blocks) to scan for logs (Lumberjack Mode)
  lumber-scan-radius: 5

  # Radius (blocks) to scan for crops (Farming Mode)
  farming-scan-radius: 4

  # Damage dealt per hit to mobs
  combat-damage: 4.0

  # Walking speed during roam (0.2 = normal player speed)
  roam-speed: 0.25

# ============================================================
#   Mining Mode - Supported Ores
# ============================================================
mining:
  ores:
    COAL_ORE:
      drop: COAL
      amount: 1
    DEEPSLATE_COAL_ORE:
      drop: COAL
      amount: 1
    IRON_ORE:
      drop: RAW_IRON
      amount: 1
    DEEPSLATE_IRON_ORE:
      drop: RAW_IRON
      amount: 1
    GOLD_ORE:
      drop: RAW_GOLD
      amount: 1
    DEEPSLATE_GOLD_ORE:
      drop: RAW_GOLD
      amount: 1
    DIAMOND_ORE:
      drop: DIAMOND
      amount: 1
    DEEPSLATE_DIAMOND_ORE:
      drop: DIAMOND
      amount: 1
    EMERALD_ORE:
      drop: EMERALD
      amount: 1
    DEEPSLATE_EMERALD_ORE:
      drop: EMERALD
      amount: 1
    LAPIS_ORE:
      drop: LAPIS_LAZULI
      amount: 4
    DEEPSLATE_LAPIS_ORE:
      drop: LAPIS_LAZULI
      amount: 4
    REDSTONE_ORE:
      drop: REDSTONE
      amount: 4
    DEEPSLATE_REDSTONE_ORE:
      drop: REDSTONE
      amount: 4
    COPPER_ORE:
      drop: RAW_COPPER
      amount: 2
    DEEPSLATE_COPPER_ORE:
      drop: RAW_COPPER
      amount: 2
    ANCIENT_DEBRIS:
      drop: ANCIENT_DEBRIS
      amount: 1
    NETHER_QUARTZ_ORE:
      drop: QUARTZ
      amount: 1
    NETHER_GOLD_ORE:
      drop: RAW_GOLD
      amount: 1

# ============================================================
#   Lumberjack Mode - Supported Logs
# ============================================================
lumber:
  logs:
    - OAK_LOG
    - SPRUCE_LOG
    - BIRCH_LOG
    - JUNGLE_LOG
    - ACACIA_LOG
    - DARK_OAK_LOG
    - MANGROVE_LOG
    - CHERRY_LOG
    - BAMBOO_BLOCK
    - CRIMSON_STEM
    - WARPED_STEM

# ============================================================
#   Farming Mode - Supported Crops
# ============================================================
farming:
  crops:
    WHEAT:
      mature-age: 7
      drop: WHEAT
      drop-amount: 1
      seed: WHEAT_SEEDS
      seed-amount: 1
    POTATOES:
      mature-age: 7
      drop: POTATO
      drop-amount: 2
      seed: POTATO
      seed-amount: 1
    CARROTS:
      mature-age: 7
      drop: CARROT
      drop-amount: 2
      seed: CARROT
      seed-amount: 1
    BEETROOTS:
      mature-age: 3
      drop: BEETROOT
      drop-amount: 1
      seed: BEETROOT_SEEDS
      seed-amount: 1

# ============================================================
#   Hologram Settings
# ============================================================
holograms:
  enabled: true
  # Height above the NPC's head
  height-offset: 2.3
  # Update interval in ticks
  update-interval: 20

# ============================================================
#   Messages (supports & color codes)
# ============================================================
messages:
  prefix: "&8[&bEgo&8] "
  spawned: "&aYour EgoBot has been spawned!"
  removed: "&cYour EgoBot has been removed. Items returned to your inventory."
  no-permission: "&cYou don't have permission to do that."
  max-bots: "&cYou already have a bot. Remove it first ({max} bot limit)."
  backpack-full: "&cYour EgoBot's backpack is full! Come collect your items."
  backpack-unloaded: "&aItems transferred from your EgoBot to your inventory."
  bot-not-found: "&cYou don't have an active EgoBot."
  summoned: "&aYour EgoBot has been summoned to you."
  reloaded: "&aConfiguration reloaded successfully."
  mode-set: "&aBot mode set to &e{mode}&a."
  not-your-bot: "&cThat bot doesn't belong to you."

# ============================================================
#   Fake Players
# ============================================================
fake-players:

  # ── Server list (shown before joining) ───────────────────
  server-list:
    enabled: true
    # How many extra fake players to add to the displayed count
    extra-count: 25
    # Max players shown (e.g. "47/100")
    max-players: 100
    # Show some fake names in the hover tooltip (up to 5)
    show-names-in-hover: true

  # ── In-game tab list ──────────────────────────────────────
  tab-list:
    enabled: true
    names:
      - "Steve_Builder"
      - "Alex_Miner"
      - "Notch_Fan99"
      - "DiamondHunter"
      - "CreeperKiller"
      - "EnderDragon_PvP"
      - "RedstoneGenius"
      - "NethPortalPro"
      - "MiningQueen"
      - "SurvivalKing"
      - "CraftingMaster"
      - "LegendaryMiner"
      - "PixelWarrior"
      - "BlockBreaker77"
      - "SkyblockChamp"

# ============================================================
#   Chatbot (responds to @EgoBot mentions in chat)
# ============================================================
chatbot:
  enabled: true
  # Get your API key from: https://console.anthropic.com/
  api-key: "YOUR_API_KEY_HERE"
  # Model to use (Haiku is fast and affordable)
  model: "claude-haiku-4-5-20251001"
  # Max response length in tokens (~200 ≈ 2–3 sentences)
  max-tokens: 200
  # Customize the bot's personality and scope
  system-prompt: "You are EgoBot, a helpful Minecraft assistant built into a Minecraft server. Answer questions about Minecraft concisely in 1-3 sentences. Only answer Minecraft-related questions. If the question is not about Minecraft, politely say you only know about Minecraft."
